name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: .

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --watchAll=false
        env:
          CI: true
      - name: Build
        run: npm run build
        env:
          APIMO_PROVIDER_ID: ${{ secrets.APIMO_PROVIDER_ID }}
          APIMO_TOKEN: ${{ secrets.APIMO_TOKEN }}
          APIMO_AGENCY_ID: ${{ secrets.APIMO_AGENCY_ID }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          KV_REDIS_URL: ${{ secrets.KV_REDIS_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Create .env file for build
        run: |
          cat > .env.local << EOF
          REACT_APP_GEMINI_API_KEY=${{ secrets.REACT_APP_GEMINI_API_KEY || 'demo-key' }}
          REACT_APP_CHROMA_URL=/chroma
          EOF
      - name: Deploy to Vercel
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          vercel-version: 53.0.1
          working-directory: ./
      - name: Smoke test
        run: |
          URL="${{ steps.vercel.outputs.preview-url }}"
          if [ -z "$URL" ]; then
            echo "❌ Missing deployment URL" >&2
            exit 1
          fi
          
          # Wait for deployment to be ready
          for i in {1..30}; do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Smoke test passed — $URL returned 200"
              exit 0
            fi
            if [ $i -lt 30 ]; then
              echo "⏳ Waiting for deployment (attempt $i/30)... got HTTP $HTTP_STATUS"
              sleep 2
            fi
          done
          
          # If we get here, deployment is not responding with 200
          RESPONSE=$(curl -s "$URL" 2>&1 || echo "Connection failed")
          echo "❌ Smoke test failed — $URL not returning 200"
          echo "Last HTTP status: $HTTP_STATUS"
          echo "Response preview: ${RESPONSE:0:200}"
          exit 1
