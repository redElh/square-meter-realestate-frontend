name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: .

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --watchAll=false
        env:
          CI: true
      - name: Build
        run: npm run build
        env:
          APIMO_PROVIDER_ID: ${{ secrets.APIMO_PROVIDER_ID }}
          APIMO_TOKEN: ${{ secrets.APIMO_TOKEN }}
          APIMO_AGENCY_ID: ${{ secrets.APIMO_AGENCY_ID }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          KV_REDIS_URL: ${{ secrets.KV_REDIS_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Deploy to Vercel
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          vercel-version: 47.2.2
          working-directory: ./
      - name: Smoke test
        run: |
          URL="${{ steps.vercel.outputs.preview-url }}"
          if [ -z "$URL" ]; then
            echo "❌ Missing deployment URL" >&2
            exit 1
          fi
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Smoke test failed — got HTTP $STATUS for $URL" >&2
            exit 1
          fi
          echo "✅ Smoke test passed — $URL returned 200"
